{% if g.auth_user %}
  <div class="modal-overlay" id="submitModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button type="button" class="modal-close" id="modalClose" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>

      <div class="form-cat-tag">Launching: Product</div>
      <h3 class="modal-title" id="modalTitle">Launch your product</h3>
      <p class="modal-sub">Submit the basics and we&apos;ll review it for the directory.</p>

      <form method="post" action="{{ url_for('submit_product') }}">
        <div class="form-grid">
          <div class="field">
            <label for="productName">Name</label>
            <input id="productName" name="name" type="text" placeholder="e.g. Launchboard" required />
          </div>
          <div class="field">
            <label for="productTagline">Short tagline</label>
            <input id="productTagline" name="tagline" type="text" placeholder="One line describing what it does" required />
          </div>
          <div class="field">
            <label for="productWebsite">Website</label>
            <input id="productWebsite" name="website_url" type="url" placeholder="https://yourproduct.com" required />
          </div>
          <div class="field">
            <label for="productRepo">Repository / demo link <span class="field-hint">(optional)</span></label>
            <input id="productRepo" name="repo_url" type="url" placeholder="https://github.com/you/your-repo" />
          </div>
          <div class="field field-row">
            <div>
              <label for="productPricing">Pricing</label>
              <select id="productPricing" name="pricing" required>
                <option value="Free">Free</option>
                <option value="Paid">Paid</option>
                <option value="Freemium">Freemium</option>
              </select>
            </div>
            <div>
              <label for="productLicense">License</label>
              <input id="productLicense" name="license_name" type="text" placeholder="Commercial / MIT / Custom" />
            </div>
          </div>
          <div class="field">
            <label for="productDescription">Description</label>
            <textarea id="productDescription" name="description" rows="4" placeholder="Tell builders what it does, who it&apos;s for, and why it matters." required></textarea>
          </div>
          <div class="field">
            <label for="productTags">Tags <span class="field-hint">(comma separated)</span></label>
            <input id="productTags" name="tags" type="text" placeholder="analytics, growth, product" />
          </div>
        </div>

        <button type="submit" class="btn btn-launch btn-lg modal-submit">Submit for review</button>
      </form>
    </div>
  </div>
{% endif %}
